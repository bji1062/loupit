# SP-INFRA-8.2 — SSH 하드닝 드롭인. 배포 시 /etc/ssh/sshd_config.d/loupit.conf 로 복사.
# 적용: sudo cp infra/deploy/sshd-hardening.conf /etc/ssh/sshd_config.d/loupit.conf
#       sudo sshd -t && sudo systemctl reload ssh
# 접속 소스는 OCI NSG(클라우드 레이어)에서 관리 IP CIDR로 추가 제한(SP-INFRA-8.1, 본 파일과 별도).
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
AllowUsers ubuntu
MaxAuthTries 3
LoginGraceTime 30
