# SP-INFRA-3.3 보안·전송 헤더 (HSTS 포함) — 각 location에서 include
# add_header는 하위 location에 자체 add_header가 있으면 상속되지 않으므로 include로 주입한다.
# HSTS max-age=15768000(6개월). 운영 안정 후 31536000(1년) + includeSubDomains + preload로 격상 권장
# (본 문서는 운영 승인 게이트, 코드 게이트 아님 — TASK 11 진행 요약 참고).
add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;   # NFR23
add_header X-Content-Type-Options    "nosniff" always;
add_header X-Frame-Options           "DENY" always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
# CSP는 AdSense/affiliate 도메인 허용이 필요하므로 SP-ADS(09) 확정 도메인 목록과 합의 후 확정.
# 초기엔 미설정(과차단 방지) — 정본은 SP-ADS 도메인 확정 후 별도 스니펫으로 추가(위임).
