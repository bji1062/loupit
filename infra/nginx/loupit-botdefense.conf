# infra/nginx/loupit-botdefense.conf — 악성 봇 UA 차단 map (스크래핑 방어 2026-07-21, Layer B).
# map은 http 컨텍스트 전용이라 server{} 밖 별도 파일. conf.d/*.conf는 sites-enabled보다 먼저
# include되므로 loupit.conf의 사용($loupit_bad_bot)보다 앞서 로드된다(loupit-limits.conf와 동일 관례).
#
# 설치: sudo cp infra/nginx/loupit-botdefense.conf /etc/nginx/conf.d/loupit-botdefense.conf
#   반영: sudo nginx -t && sudo systemctl reload nginx
#
# ── 규칙 ──────────────────────────────────────────────────────────────────────
#  · map은 **첫 일치 우선**(위→아래). 그래서 검색·AdSense·소셜 크롤러를 **맨 위**에 두어
#    아래 자동화 프레임워크 패턴보다 먼저 0(허용)으로 확정한다. SEO·애드센스 수익 = 사업의
#    생명줄이므로 이들은 어떤 경우에도 차단하지 않는다.
#  · curl·wget은 **의도적으로 목록에서 제외**한다: (a) smoke.sh·모니터링이 curl을 쓰고,
#    (b) 데이터 API는 Layer A(X-Loupit-Client 헤더)가 이미 맨 curl을 403 처리한다. 정적 HTML을
#    curl 루프로 긁는 잔여 벡터는 남지만, 그건 애초에 공개된 SEO 산출물이라 수용한다(정직한 한계).
#  · UA는 위조 가능하다. 이 layer는 "게으른 스크래퍼 90%"를 값싸게 거르는 것이 목적이지
#    완전 차단이 아니다. Layer A(헤더)·D(robots)와 함께 다층으로 비용을 올린다.
# ─────────────────────────────────────────────────────────────────────────────
map $http_user_agent $loupit_bad_bot {
    default 0;

    # ── 화이트리스트(절대 차단 금지) — 반드시 아래 차단목록보다 먼저 ──
    # 검색엔진(SEO)
    "~*googlebot"                 0;
    "~*google-inspectiontool"     0;
    "~*bingbot"                   0;
    "~*applebot"                  0;
    "~*duckduckbot"               0;
    "~*yandex(bot|images)"        0;
    "~*baiduspider"               0;
    "~*(naverbot|yeti)"           0;   # 네이버
    "~*daum(oa)?"                 0;   # 다음/카카오
    "~*slurp"                     0;   # Yahoo
    # ★ AdSense 크롤러 — 차단하면 광고가 죽는다
    "~*mediapartners-google"      0;
    "~*adsbot-google"             0;
    # 소셜 미리보기(공유 카드 렌더)
    "~*facebookexternalhit"       0;
    "~*twitterbot"                0;
    "~*(kakaotalk-scrap|kakaotalk)" 0;
    "~*telegrambot"               0;
    "~*discordbot"                0;
    "~*(chrome-lighthouse|pagespeed)" 0;

    # ── 차단(자동화 프레임워크·헤드리스·공격적 SEO 스크래퍼) ──
    "~*(python-requests|python-urllib|aiohttp|httpx)"  1;
    "~*scrapy"                    1;
    "~*(go-http-client|okhttp|java/|apache-httpclient|libwww|winhttp|httpclient)" 1;
    "~*(node-fetch|axios|got |undici)"                 1;
    "~*(headlesschrome|puppeteer|playwright|selenium|phantomjs)" 1;
    "~*(ahrefsbot|semrushbot|mj12bot|dotbot|blexbot|dataforseo|petalbot|serpstat|megaindex)" 1;
    "~*(scraper|crawler|harvest|spider)"               1;   # 자칭 스크래퍼(정직한 UA)
}
