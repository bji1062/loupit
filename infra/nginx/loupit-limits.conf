# infra/nginx/loupit-limits.conf — API 남용 방어 레이트리밋 zone 정의(감사 #7a).
# limit_req_zone은 http 컨텍스트 전용 지시자라 server{} 안에 둘 수 없어 별도 파일로 분리한다.
#
# 설치: sudo cp infra/nginx/loupit-limits.conf /etc/nginx/conf.d/loupit-limits.conf
#   /etc/nginx/nginx.conf 의 http{} 는 conf.d/*.conf 를 sites-enabled/* 보다 먼저 include하므로,
#   여기 정의한 zone이 loupit.conf(sites-enabled)의 limit_req 사용보다 앞서 로드된다(순서 보장).
#   반영: sudo nginx -t && sudo systemctl reload nginx.
#
# 키는 $binary_remote_addr(클라이언트 IP 4바이트). 존별 10m ≈ 16만 IP 상태 보관.
# limit_req_status(429)와 실제 limit_req 적용은 loupit.conf(server/location)에서 한다.
#
# ── 레이트 산정 근거(정상 트래픽 패턴, 과차단 금지) ────────────────────────────────
#  · 홈/부팅: GET /reference/all 1회(브라우저 1h 캐시로 재로드시 미재요청) +
#    GET /comparisons/trending 1회(mount당 1회, 폴링 없음 — trending.js는 setInterval로
#    이미 받은 목록을 롤링만 함). 검색: 300ms 디바운스(search.js) → 타이핑 멈출 때 1요청.
#    → 읽기 경로 429는 UX를 깨뜨리므로(부팅 오류·검색 무결과) 일반 리밋은 넉넉히 잡는다.
#  · 쓰기: POST /comparisons/log 는 "비교하기" 1클릭당 1회(fire-and-forget). 유일한 쓰기이자
#    남용 벡터(트렌딩 조작·커넥션풀 maxsize=10 포화·TCOMPARE_LOG 무한 증가). 이 경로 429는
#    클라가 조용히 무시(sendBeacon/keepalive fire-and-forget)라 UX 영향 0 → 강하게 조인다.

# 일반(전 /api/v1/, 읽기 포함): 5r/s = 300r/m. NAT 공유 IP·검색 버스트에 여유, GET 플러드 상한.
limit_req_zone $binary_remote_addr zone=loupit_api:10m rate=300r/m;

# 로그 쓰기 전용(POST /comparisons/log): 20r/m(≈1건/3s 지속). 자동화 조작 루프는 상한에 걸리고,
# 사람의 정상 비교 빈도(세션당 소수)는 burst로 흡수해 무영향. 429가 UX 무손상이라 강하게 잡음.
limit_req_zone $binary_remote_addr zone=loupit_log:10m rate=20r/m;
