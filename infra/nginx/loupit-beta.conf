# beta.jobcho.wiki — 무중단 스테이징 vhost. jobcho.wiki(라이브 jobchoice)와 완전 격리.
# - API 프록시 → 127.0.0.1:8001 (loupit-beta-api.service)
# - 정적 루트 = loupit 리포 web/ + web/dist (프로덕션 loupit.conf와 동일 산출물)
# - 스테이징 SEO 보호: X-Robots-Tag noindex(loupit-beta-security.conf) + robots.txt 전면 Disallow
# 배치: /etc/nginx/sites-available/loupit-beta.conf → sites-enabled 심링크.
# nginx 1.18 → `listen 443 ssl http2;` 형식(loupit.conf와 동일).

# ── HTTP :80 — ACME challenge 통과 후 전량 HTTPS 301 ──
server {
    listen 80;
    listen [::]:80;
    server_name beta.jobcho.wiki;

    location ^~ /.well-known/acme-challenge/ {
        root /home/ubuntu/loupit/web;
        default_type "text/plain";
    }
    location / { return 301 https://$host$request_uri; }
}

# ── HTTPS :443 (beta) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name beta.jobcho.wiki;

    ssl_certificate     /etc/letsencrypt/live/beta.jobcho.wiki/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beta.jobcho.wiki/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:MozSSLbeta:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root /home/ubuntu/loupit/web;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/css application/javascript application/json image/svg+xml application/xml;

    include /etc/nginx/snippets/loupit-beta-security.conf;

    # 스테이징: 검색엔진 전면 차단(dist/robots.txt는 jobcho.wiki용 → 여기선 오버라이드)
    location = /robots.txt {
        include /etc/nginx/snippets/loupit-beta-security.conf;
        # Content-Type은 return 200 + default_type(text/plain)로 nginx가 이미 부여 —
        # add_header Content-Type 를 두면 중복 헤더가 되므로 두지 않는다(L-3).
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # 랜딩
    location = / {
        include /etc/nginx/snippets/loupit-beta-security.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    # 비교 툴 SPA 셸
    location = /compare  { return 301 /compare/; }
    location = /compare/ {
        include /etc/nginx/snippets/loupit-beta-security.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /compare/index.html =404;
    }

    # 정적 자산 — 베타는 ?v= 해시 스탬핑을 하지 않으므로(프로덕션 loupit.conf만 stamp_assets.sh
    # 로 ?v=sha8 부여 후 immutable) revalidate 캐시를 쓴다. no-cache = 브라우저가 매 요청
    # 조건부(If-Modified-Since)로 검증 → 변경 없으면 304, 변경 시 즉시 최신 반영(스테이징 반복 편의).
    location ~* \.(?:css|js|woff2|svg|png|jpg|webp|ico)$ {
        include /etc/nginx/snippets/loupit-beta-security.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # ── L-2 canonical 중복 제거 ──
    # 문서루트가 web/ 라 web/dist 산출물이 /dist/... 로 그대로 200 노출된다.
    # (a) /dist/ 직접 노출 차단(^~ 라 정규식/일반 location 보다 우선; 내부 try_files·
    #     error_page redirect 는 /dist/ 로 시작하는 URI 를 만들지 않아 클린 라우트에 무해).
    location ^~ /dist/ { return 404; }
    # (b) 직접 .html/.html.gz 접근은 아래 /company/·/vs/ 의 try_files 를 `$uri.html` 로만
    #     두어 차단한다: 클린 URL(/company/<slug>)은 $uri.html 로 해석돼 200, 이미 .html 이
    #     붙은 요청(/company/<slug>.html)은 <slug>.html.html 을 찾다 =404 로 떨어진다.

    # 생성물: 회사 상세 ~95
    location ^~ /company/ {
        root /home/ubuntu/loupit/web/dist;
        include /etc/nginx/snippets/loupit-beta-security.conf;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri.html =404;
    }

    # 생성물: 인기 조합
    location ^~ /vs/ {
        root /home/ubuntu/loupit/web/dist;
        include /etc/nginx/snippets/loupit-beta-security.conf;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri.html =404;
    }

    # 생성물: 정책 4종
    location = /privacy    { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-beta-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /privacy.html    =404; }
    location = /terms      { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-beta-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /terms.html      =404; }
    location = /disclaimer { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-beta-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /disclaimer.html =404; }
    location = /ads        { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-beta-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /ads.html        =404; }

    # SEO 산출물(sitemap은 서빙하되 noindex 유지 — 검증용)
    location = /sitemap.xml { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-beta-security.conf; add_header Cache-Control "no-store" always; }

    # ── API 프록시 → 베타 인스턴스(:8001) ──
    location ^~ /api/v1/ {
        include /etc/nginx/snippets/loupit-beta-security.conf;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_buffering on;
    }

    # 그 외 경로 → 정적 404
    location / {
        include /etc/nginx/snippets/loupit-beta-security.conf;
        try_files $uri $uri/ =404;
    }
    error_page 404 /404.html;
    location = /404.html {
        root /home/ubuntu/loupit/web/dist;
        include /etc/nginx/snippets/loupit-beta-security.conf;
        add_header Cache-Control "no-store" always;
        internal;
    }
}
