# infra/nginx/loupit.test.conf — CFG-1 로컬 정적 문법 검증 전용 래퍼(배포 미사용, gitignore 대상 아님).
#
# 배경: `loupit.conf`는 /etc/nginx/sites-available/ 드롭인(server{} 블록만)이라
# `events{}`/`http{}` 최상위 컨텍스트가 없으면 `nginx -t -c <file>`로 단독 로드할 수 없다
# (nginx -c는 해당 파일을 nginx.conf 전체로 취급). 이 파일은 그 컨텍스트만 감싸서
# 로컬/CI에서 `nginx -t -c infra/nginx/loupit.test.conf`로 문법만 검증한다.
# 실제 배포 호스트의 정본 검증은 CFG-1 정의대로 `sudo nginx -t`(시스템 전체 conf,
# loupit.conf가 sites-enabled에 심링크된 상태)를 사용한다 — 이 파일은 그 대체가 아니다.
# 부작용 없음: 워커를 실제로 기동하지 않고(-t) 텍스트만 파싱하므로 실행 중인 nginx에 무영향.
worker_processes 1;
pid /tmp/loupit-nginx-test.pid;
events { worker_connections 16; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    # 실배포와 동일하게 http 컨텍스트 zone 정의(conf.d/loupit-limits.conf)를 server{}보다 먼저 로드
    # — 누락 시 loupit.conf의 limit_req 참조가 "zero size shared memory zone"으로 실패한다(감사 #7a).
    include /home/ubuntu/loupit/infra/nginx/loupit-limits.conf;
    # 스크래핑 방어 Layer B의 $loupit_bad_bot map(conf.d/loupit-botdefense.conf) — 누락 시
    # loupit.conf의 `if ($loupit_bad_bot)`가 "unknown variable"로 실패한다(2026-07-21).
    include /home/ubuntu/loupit/infra/nginx/loupit-botdefense.conf;
    include /home/ubuntu/loupit/infra/nginx/loupit.conf;
}
