# SP-INFRA-3 loupit 사이트 conf — 프로덕션(HTTPS, HTTP/2, HSTS)
# 근거: docs/SPEC/11-인프라-배포.md SP-INFRA-3.1·3.2. TASK: docs/TASK/11-인프라배포.md T-11.3.1~11.3.4.
# 배치: /etc/nginx/sites-available/loupit.conf 로 복사 후 sites-enabled 심링크(표준 Debian/Ubuntu 레이아웃).
# 인증서: Let's Encrypt /etc/letsencrypt/live/jobcho.wiki/ (jobcho.wiki + www, 90일 자동갱신, SP-INFRA-4)
# 정적 루트: /home/ubuntu/loupit/web (셸·자산) + /home/ubuntu/loupit/web/dist (생성물)
#
# HTTP/2 지시자 버전 조건부(SP-INFRA §3.3 "버전 조건부 택1", 설치 버전으로 결정 — DG 아님):
#   nginx >= 1.25.1 → 별도 지시자 `http2 on;` 사용.
#   nginx <  1.25.1 → `listen 443 ssl http2;`(본 파일 채택 — 배포 호스트 설치본이 1.24 계열 가정).
#   실제 배포 호스트의 `nginx -v`로 재확인 후 필요 시 상단 주석과 함께 전환할 것.

# ── HTTP :80 — ACME challenge 통과 후 전량 HTTPS 301 ──
server {
    listen 80;
    listen [::]:80;
    server_name jobcho.wiki www.jobcho.wiki;

    # Let's Encrypt webroot — redirect보다 우선(^~)
    location ^~ /.well-known/acme-challenge/ {
        root /home/ubuntu/loupit/web;
        default_type "text/plain";
    }
    location / { return 301 https://$host$request_uri; }
}

# ── www → apex 정규화(canonical 단일화, NFR11 보강) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.jobcho.wiki;
    ssl_certificate     /etc/letsencrypt/live/jobcho.wiki/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobcho.wiki/privkey.pem;
    return 301 https://jobcho.wiki$request_uri;
}

# ── HTTPS :443 (apex) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jobcho.wiki;

    # ── TLS (Mozilla Intermediate, ECDHE only) ──
    ssl_certificate     /etc/letsencrypt/live/jobcho.wiki/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobcho.wiki/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # OCSP stapling 미사용 — Let's Encrypt 2025 OCSP 종료, 신규 인증서에 responder URL 없음

    # 정적 기본 루트 = 프론트 셸·자산
    root /home/ubuntu/loupit/web;
    index index.html;
    charset utf-8;                  # NFR29
    limit_req_status 429;           # 레이트리밋 초과 응답코드(감사 #7a). zone: conf.d/loupit-limits.conf.

    # ── gzip: 런타임 + 사전압축(gzip_static) ──
    gzip on;
    gzip_static on;                 # release.sh/생성기가 만든 .gz 우선 서빙
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/css application/javascript application/json image/svg+xml application/xml;

    # 공통 보안 헤더(HSTS 등) — location마다 add_header 재선언이 필요하므로 include
    include /etc/nginx/snippets/loupit-security.conf;

    # 랜딩
    location = / {
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    # 비교 툴 SPA 셸
    # $is_args$args 필수: return 301 은 rewrite 와 달리 쿼리스트링을 자동 승계하지 않는다.
    # 없으면 /vs/ 조합 페이지의 CTA(/compare?a=..&b=..)가 빈 비교 툴로 떨어진다.
    location = /compare  { return 301 /compare/$is_args$args; }
    location = /compare/ {
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /compare/index.html =404;
    }

    # ── 자산 v2 세대(2026-07-19 캐시버스팅, 감사 미해소 ⑤) ──
    # 무빌드(AS3)·소스 직서빙이라 해시 URL이 없는데 1년 immutable을 걸어, 배포해도 재방문
    # 브라우저에 구 자산이 최대 1년 잔존했다. ?v= 쿼리 스탬프는 ES모듈 하위 import(./ui.js 등)의
    # URL을 못 바꿔 해법이 아니다. 해법: 공개 URL 세대를 /assets/v2/로 이동(alias — 같은 디렉터리,
    # 오염 캐시 전면 우회) + no-cache 재검증(변경 없으면 304). 상대 import는 importer URL 기준
    # 해석이라 하위 모듈 전체가 v2를 자동 상속한다. `^~`라 아래 확장자 regex보다 우선하고,
    # 확장자 무관 매칭이라 data/*.json 등 regex 밖 자산도 캐시 정책을 받는다.
    # gzip_static off 필수: .gz 사이드카는 원본과 신선도 비교 없이 서빙돼 no-cache 체계를 조용히
    # 무력화한다 — web/assets 사전압축 금지(런타임 gzip 전용, SP-INFRA-9.3).
    location ^~ /assets/v2/ {
        alias /home/ubuntu/loupit/web/assets/;
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "no-cache" always;
        access_log off;
        gzip_static off;
    }

    # 구 자산 경로(무버전) — v2 이전 HTML을 캐시한 방문자·크롤러용 하위호환. immutable 재오염을
    # 막기 위해 no-cache 강등(기오염 사용자 구제는 HTML의 v2 참조 교체가 전담 — 이 강등만으로는
    # 이미 immutable로 캐시된 브라우저를 되돌릴 수 없다).
    location ~* \.(?:css|js|woff2|svg|png|jpg|webp|ico)$ {
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "no-cache" always;
        access_log off;
        try_files $uri =404;
    }

    # ── L-2 canonical 중복 제거 ──
    # 문서루트가 web/ 라 web/dist 산출물이 /dist/... 로 그대로 200 노출된다.
    # (a) /dist/ 직접 노출 차단(^~ 라 정규식/일반 location 보다 우선; 내부 try_files·
    #     error_page redirect 는 /dist/ 로 시작하는 URI 를 만들지 않아 클린 라우트에 무해).
    location ^~ /dist/ { return 404; }
    #     이전 빌드 백업(web/dist.prev/)도 같은 이유로 노출된다 — 옛 도메인 canonical 을 단
    #     stale 사본이라 중복 콘텐츠로 잡힌다. ^~ 라 위 정적자산 정규식보다 우선해 하위 css/js 도 막힌다.
    location ^~ /dist.prev/ { return 404; }
    # (b) 직접 .html/.html.gz 접근은 아래 /company/·/vs/ 의 try_files 를 `$uri.html` 로만
    #     두어 차단한다: 클린 URL(/company/<slug>)은 $uri.html 로 해석돼 200, 이미 .html 이
    #     붙은 요청(/company/<slug>.html)은 <slug>.html.html 을 찾다 =404 로 떨어진다.

    # 생성물: 회사 상세 ~95 (web/dist/company/{slug}.html)
    location ^~ /company/ {
        root /home/ubuntu/loupit/web/dist;
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri.html =404;
    }

    # 생성물: 인기 조합 (web/dist/vs/{a}-{b}.html)
    location ^~ /vs/ {
        root /home/ubuntu/loupit/web/dist;
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri.html =404;
    }

    # 생성물: 회사 인덱스(2026-07-19 고아 페이지 해소 — 등록 회사 전량 링크 진입문) + 정책 4종
    location = /companies  { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /companies.html  =404; }
    location = /privacy    { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /privacy.html    =404; }
    location = /terms      { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /terms.html      =404; }
    location = /disclaimer { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /disclaimer.html =404; }
    location = /ads        { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /ads.html        =404; }

    # SEO 산출물
    location = /sitemap.xml { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=3600" always; }
    location = /robots.txt  { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=3600" always; }

    # ── API 프록시 (GET 5종 + 익명 비교 로그 POST 1종) ──
    # 남용 방어(감사 #7a): 일반 리밋(loupit_api)을 전 /api/v1/에 완만히 걸고, 유일한 쓰기이자
    # 조작·풀포화·무한증가 벡터인 POST /comparisons/log 에는 아래 `=` 블록에서 강한 리밋
    # (loupit_log)을 추가로 건다. zone 정의: conf.d/loupit-limits.conf. burst+nodelay =
    # 순간 버스트 허용 후 평균율로 수렴(정상 페이지로드·검색 버스트 흡수, 자동화 플러드는 상한).

    # 익명 비교 로그 쓰기 — 일반+강한 리밋 이중 적용(`=` 매칭이 `^~` 보다 우선하므로 이 URI는
    # 아래 ^~ 블록 대신 여기로 매칭). 별개 location이라 proxy_* 설정을 상속하지 않아 명시 반복한다
    # — 아래 ^~ 블록과 반드시 동기 유지할 것.
    location = /api/v1/comparisons/log {
        include /etc/nginx/snippets/loupit-security.conf;
        limit_req zone=loupit_api burst=60 nodelay;
        limit_req zone=loupit_log burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_buffering on;
    }

    location ^~ /api/v1/ {
        include /etc/nginx/snippets/loupit-security.conf;
        limit_req zone=loupit_api burst=60 nodelay;   # 일반 리밋(읽기 UX 무손상 여유폭)
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_buffering on;
        # Cache-Control은 앱이 설정(reference/all: public, max-age=3600 — FR-92). Nginx add_header 미개입.
    }

    # 그 외 경로 → 정적 404(생성물)
    location / {
        include /etc/nginx/snippets/loupit-security.conf;
        try_files $uri $uri/ =404;
    }
    error_page 404 /404.html;
    location = /404.html {
        root /home/ubuntu/loupit/web/dist;
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "no-store" always;
        internal;
    }
}
