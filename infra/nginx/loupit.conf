# SP-INFRA-3 loupit 사이트 conf — 프로덕션(HTTPS, HTTP/2, HSTS)
# 근거: docs/SPEC/11-인프라-배포.md SP-INFRA-3.1·3.2. TASK: docs/TASK/11-인프라배포.md T-11.3.1~11.3.4.
# 배치: /etc/nginx/sites-available/loupit.conf 로 복사 후 sites-enabled 심링크(표준 Debian/Ubuntu 레이아웃).
# 인증서: Let's Encrypt /etc/letsencrypt/live/jobcho.wiki/ (jobcho.wiki + www, 90일 자동갱신, SP-INFRA-4)
# 정적 루트: /home/ubuntu/loupit/web (셸·자산) + /home/ubuntu/loupit/web/dist (생성물)
#
# HTTP/2 지시자 버전 조건부(SP-INFRA §3.3 "버전 조건부 택1", 설치 버전으로 결정 — DG 아님):
#   nginx >= 1.25.1 → 별도 지시자 `http2 on;` 사용.
#   nginx <  1.25.1 → `listen 443 ssl http2;`(본 파일 채택 — 배포 호스트 설치본이 1.24 계열 가정).
#   실제 배포 호스트의 `nginx -v`로 재확인 후 필요 시 상단 주석과 함께 전환할 것.

# ── HTTP :80 — ACME challenge 통과 후 전량 HTTPS 301 ──
server {
    listen 80;
    listen [::]:80;
    server_name jobcho.wiki www.jobcho.wiki;

    # Let's Encrypt webroot — redirect보다 우선(^~)
    location ^~ /.well-known/acme-challenge/ {
        root /home/ubuntu/loupit/web;
        default_type "text/plain";
    }
    location / { return 301 https://$host$request_uri; }
}

# ── www → apex 정규화(canonical 단일화, NFR11 보강) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.jobcho.wiki;
    ssl_certificate     /etc/letsencrypt/live/jobcho.wiki/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobcho.wiki/privkey.pem;
    return 301 https://jobcho.wiki$request_uri;
}

# ── HTTPS :443 (apex) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jobcho.wiki;

    # ── TLS (Mozilla Intermediate, ECDHE only) ──
    ssl_certificate     /etc/letsencrypt/live/jobcho.wiki/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobcho.wiki/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # OCSP stapling 미사용 — Let's Encrypt 2025 OCSP 종료, 신규 인증서에 responder URL 없음

    # 정적 기본 루트 = 프론트 셸·자산
    root /home/ubuntu/loupit/web;
    index index.html;
    charset utf-8;                  # NFR29

    # ── gzip: 런타임 + 사전압축(gzip_static) ──
    gzip on;
    gzip_static on;                 # release.sh/생성기가 만든 .gz 우선 서빙
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/css application/javascript application/json image/svg+xml application/xml;

    # 공통 보안 헤더(HSTS 등) — location마다 add_header 재선언이 필요하므로 include
    include /etc/nginx/snippets/loupit-security.conf;

    # 랜딩
    location = / {
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    # 비교 툴 SPA 셸
    location = /compare  { return 301 /compare/; }
    location = /compare/ {
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /compare/index.html =404;
    }

    # 정적 자산(해시 버전 → 1년 immutable). 확장자 매칭.
    location ~* \.(?:css|js|woff2|svg|png|jpg|webp|ico)$ {
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # ── L-2 canonical 중복 제거 ──
    # 문서루트가 web/ 라 web/dist 산출물이 /dist/... 로 그대로 200 노출된다.
    # (a) /dist/ 직접 노출 차단(^~ 라 정규식/일반 location 보다 우선; 내부 try_files·
    #     error_page redirect 는 /dist/ 로 시작하는 URI 를 만들지 않아 클린 라우트에 무해).
    location ^~ /dist/ { return 404; }
    # (b) 직접 .html/.html.gz 접근은 아래 /company/·/vs/ 의 try_files 를 `$uri.html` 로만
    #     두어 차단한다: 클린 URL(/company/<slug>)은 $uri.html 로 해석돼 200, 이미 .html 이
    #     붙은 요청(/company/<slug>.html)은 <slug>.html.html 을 찾다 =404 로 떨어진다.

    # 생성물: 회사 상세 ~95 (web/dist/company/{slug}.html)
    location ^~ /company/ {
        root /home/ubuntu/loupit/web/dist;
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri.html =404;
    }

    # 생성물: 인기 조합 (web/dist/vs/{a}-{b}.html)
    location ^~ /vs/ {
        root /home/ubuntu/loupit/web/dist;
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri.html =404;
    }

    # 생성물: 정책 4종
    location = /privacy    { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /privacy.html    =404; }
    location = /terms      { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /terms.html      =404; }
    location = /disclaimer { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /disclaimer.html =404; }
    location = /ads        { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=300" always; try_files /ads.html        =404; }

    # SEO 산출물
    location = /sitemap.xml { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=3600" always; }
    location = /robots.txt  { root /home/ubuntu/loupit/web/dist; include /etc/nginx/snippets/loupit-security.conf; add_header Cache-Control "public, max-age=3600" always; }

    # ── API 프록시 (읽기전용 GET 4종) ──
    location ^~ /api/v1/ {
        include /etc/nginx/snippets/loupit-security.conf;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_buffering on;
        # Cache-Control은 앱이 설정(reference/all: public, max-age=3600 — FR-92). Nginx add_header 미개입.
    }

    # 그 외 경로 → 정적 404(생성물)
    location / {
        include /etc/nginx/snippets/loupit-security.conf;
        try_files $uri $uri/ =404;
    }
    error_page 404 /404.html;
    location = /404.html {
        root /home/ubuntu/loupit/web/dist;
        include /etc/nginx/snippets/loupit-security.conf;
        add_header Cache-Control "no-store" always;
        internal;
    }
}
