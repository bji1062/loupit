{# _head_meta.html — title·description·canonical·OG (SP-GEN-6.2). 회사·조합·정책·
   404 전 템플릿이 공통 소비하는 SEO head 요소(NFR6·7·11). #}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ meta_title }}</title>
<meta name="description" content="{{ meta_desc }}">
<link rel="canonical" href="{{ canonical }}">
<meta property="og:title" content="{{ og.title }}">
<meta property="og:description" content="{{ og.description }}">
<meta property="og:type" content="{{ og.type }}">
<meta property="og:url" content="{{ og.url }}">
<meta property="og:image" content="{{ og.image }}">
<link rel="preload" href="/assets/fonts/PretendardVariable.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/assets/css/styles.css">
